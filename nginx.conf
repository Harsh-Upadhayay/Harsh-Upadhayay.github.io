server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1024;

    location = /v4 { try_files /v4.html =404; }
    location = /v7 { try_files /v7.html =404; }
    location = /v9 { try_files /v9.html =404; }

    location = /archived/v1 { try_files /v1.html =404; }
    location = /archived/v2 { try_files /v2.html =404; }
    location = /archived/v3 { try_files /v3.html =404; }
    location = /archived/v5 { try_files /v5.html =404; }
    location = /archived/v6 { try_files /v6.html =404; }
    location = /archived/v8 { try_files /v8.html =404; }

    location = /v1 { return 301 /archived/v1; }
    location = /v2 { return 301 /archived/v2; }
    location = /v3 { return 301 /archived/v3; }
    location = /v5 { return 301 /archived/v5; }
    location = /v6 { return 301 /archived/v6; }
    location = /v8 { return 301 /archived/v8; }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|ico|png|jpg|jpeg|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;
}
